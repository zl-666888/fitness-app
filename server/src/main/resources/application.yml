server:
  port: 8080

spring:
  application:
    name: fitness-server
  profiles:
    active: dev
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.fitness.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: fitness-app-secret-key-2026-very-long-and-secure-key-here-1234567890
  access-token-expire: 7200
  refresh-token-expire: 604800

upload:
  path: ${user.dir}/uploads
  max-size: 52428800

ffmpeg:
  path: 'D:\Devlop\ffmpeg\bin\ffmpeg.exe'
  probe-path: 'D:\Devlop\ffmpeg\bin\ffprobe.exe'
